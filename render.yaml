services:
  - type: web
    name: otakuoracle
    runtime: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    healthCheckPath: /
    domains:
      - otakuoracle.com
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HOST
        value: 0.0.0.0
      - key: OTAKU_ORACLE_DB_PATH
        value: /tmp/otaku_oracle.db
      - key: OTAKU_ORACLE_ADMIN_PASSCODE
        sync: false
